<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KolKMa</title>
<meta name="description" content="KolKMa — bringing people together.">
<link rel="icon" href="assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0B1F4D;
    --red:#E01F26;
    --blue:#1450E0;
    --paper:#FAFAF8;
    --ink-soft:#5A6478;
    --line: rgba(11,31,77,0.10);
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html{ scroll-behavior:smooth; }

  body{
    background:var(--paper);
    color:var(--navy);
    font-family:'Inter', sans-serif;
    overflow-x:hidden;
  }

  /* ---------- NAV ---------- */
  nav{
    position:fixed;
    top:0; left:0; right:0;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:28px 6vw;
    z-index:10;
    mix-blend-mode:normal;
  }

  .nav-mark{
    display:flex;
    align-items:center;
    gap:10px;
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size:1.1rem;
    letter-spacing:0.02em;
  }

  .nav-mark img{
    width:28px;
    height:28px;
  }

  .nav-links{
    display:flex;
    gap:2.4rem;
    font-size:0.9rem;
    color:var(--ink-soft);
  }

  .nav-links a{
    color:var(--ink-soft);
    text-decoration:none;
    position:relative;
    transition:color 0.25s ease;
  }

  .nav-links a::after{
    content:"";
    position:absolute;
    left:0; bottom:-4px;
    width:0%;
    height:1px;
    background:var(--navy);
    transition:width 0.25s ease;
  }

  .nav-links a:hover{ color:var(--navy); }
  .nav-links a:hover::after{ width:100%; }

  /* ---------- HERO ---------- */
  .hero{
    position:relative;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:0 6vw;
  }

  .orbit-field{
    position:absolute;
    top:50%; left:50%;
    width:min(720px, 92vw);
    height:min(720px, 92vw);
    transform:translate(-50%,-52%);
    pointer-events:none;
  }

  .orbit-ring{
    position:absolute;
    inset:0;
    border-radius:50%;
    border:1px solid var(--line);
  }
  .orbit-ring.r2{ inset:9%; }
  .orbit-ring.r3{ inset:18%; }

  .logo-wrap{
    position:relative;
    width:min(220px, 34vw);
    height:min(220px, 34vw);
    margin-bottom:2.6rem;
    perspective:600px;
  }

  .logo-3d{
    position:relative;
    width:100%;
    height:100%;
    transform-style:preserve-3d;
    /* pivot axis runs vertically through the "lK" of the KolKMa wordmark,
       slightly left of center rather than dead-center */
    transform-origin:42% 50%;
    animation:flip3d 5.6s cubic-bezier(0.45,0,0.55,1) infinite;
    will-change:transform;
  }

  .logo-face{
    position:absolute;
    inset:0;
    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
  }

  .logo-face img{
    width:100%;
    height:100%;
    filter:drop-shadow(0 18px 34px rgba(11,31,77,0.16));
    animation:sheen 5.6s cubic-bezier(0.45,0,0.55,1) infinite;
  }

  .logo-face.back{
    transform:rotateY(180deg);
  }

  .logo-face.back img{
    filter:drop-shadow(0 18px 34px rgba(11,31,77,0.16)) brightness(0.78) saturate(0.85);
  }

  /* brightens right as each face turns toward edge-on, like light catching a curved surface */
  @keyframes sheen{
    0%, 50%, 100% { filter:drop-shadow(0 18px 34px rgba(11,31,77,0.16)) brightness(1); }
    22%, 78%      { filter:drop-shadow(0 18px 34px rgba(11,31,77,0.16)) brightness(1.18); }
  }

  @keyframes flip3d{
    0%   { transform:rotateY(0deg); }
    50%  { transform:rotateY(180deg); }
    100% { transform:rotateY(360deg); }
  }

  /* the rim: a thin colored slice standing in for the logo's "thickness",
     only visible while the disc is turned edge-on (~90deg / ~270deg) */
  .logo-edge{
    position:absolute;
    top:8%;
    bottom:8%;
    left:42%;
    width:10px;
    transform:translateX(-50%) scaleX(0.15);
    transform-origin:center;
    border-radius:6px;
    background:linear-gradient(180deg, var(--red) 0%, var(--navy) 50%, var(--blue) 100%);
    opacity:0;
    animation:edgeReveal 5.6s cubic-bezier(0.45,0,0.55,1) infinite;
    box-shadow:0 0 12px rgba(11,31,77,0.25);
  }

  @keyframes edgeReveal{
    0%, 50%, 100% { opacity:0;    transform:translateX(-50%) scaleX(0.15); }
    25%, 75%      { opacity:0.95; transform:translateX(-50%) scaleX(1); }
  }

  .logo-shadow{
    position:absolute;
    left:42%;
    bottom:-14px;
    width:60%;
    height:16px;
    transform:translateX(-50%);
    background:radial-gradient(ellipse, rgba(11,31,77,0.20) 0%, rgba(11,31,77,0) 72%);
    animation:shadowPulse 5.6s cubic-bezier(0.45,0,0.55,1) infinite;
    z-index:-1;
  }

  @keyframes shadowPulse{
    0%, 100% { transform:translateX(-50%) scaleX(1); opacity:0.5; }
    50%      { transform:translateX(-50%) scaleX(0.32); opacity:0.22; }
  }



  .logo-glow{
    position:absolute;
    inset:-14%;
    border-radius:50%;
    background:radial-gradient(circle, rgba(224,31,38,0.10) 0%, rgba(20,80,224,0.08) 45%, rgba(255,255,255,0) 72%);
    z-index:-1;
  }

  .eyebrow{
    font-size:0.78rem;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:1.1rem;
  }

  .eyebrow span{ color:var(--red); }

  h1{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:clamp(2.6rem, 7vw, 5.4rem);
    line-height:1.02;
    letter-spacing:-0.01em;
  }

  h1 .accent-blue{ color:var(--blue); }
  h1 .accent-red{ color:var(--red); }

  .tagline{
    max-width:520px;
    margin:1.6rem auto 0;
    font-size:1.05rem;
    line-height:1.6;
    color:var(--ink-soft);
  }

  .cta-row{
    display:flex;
    gap:1rem;
    margin-top:2.6rem;
  }

  .btn{
    font-family:'Inter', sans-serif;
    font-size:0.92rem;
    font-weight:500;
    padding:0.9rem 1.8rem;
    border-radius:999px;
    text-decoration:none;
    transition:transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    display:inline-block;
  }

  .btn-primary{
    background:var(--navy);
    color:#fff;
  }
  .btn-primary:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 24px rgba(11,31,77,0.25);
  }

  .btn-ghost{
    color:var(--navy);
    border:1px solid var(--line);
  }
  .btn-ghost:hover{
    border-color:var(--navy);
    transform:translateY(-2px);
  }

  .scroll-hint{
    position:absolute;
    bottom:2.6rem;
    left:50%;
    transform:translateX(-50%);
    font-size:0.72rem;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--ink-soft);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:0.5rem;
  }

  .scroll-hint::after{
    content:"";
    width:1px;
    height:34px;
    background:linear-gradient(var(--ink-soft), transparent);
    animation:pulse 2s ease-in-out infinite;
  }

  @keyframes pulse{
    0%,100%{ opacity:0.3; }
    50%{ opacity:1; }
  }

  @media (prefers-reduced-motion: reduce){
    .logo-3d{ animation:none; }
    .logo-face img{ animation:none; }
    .logo-edge{ animation:none; opacity:0; }
    .logo-shadow{ animation:none; }
    .scroll-hint::after{ animation:none; }
  }

  @media (max-width:640px){
    .nav-links{ display:none; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-mark">
    <img src="logo.png" alt="KolKMa logo">
    KolKMa
  </div>
  <div class="nav-links">
    <a href="#about">About</a>
    <a href="#work">Work</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<section class="hero" id="top">
  <div class="orbit-field" aria-hidden="true">
    <div class="orbit-ring"></div>
    <div class="orbit-ring r2"></div>
    <div class="orbit-ring r3"></div>
  </div>

  <div class="eyebrow">People <span>&times;</span> Purpose <span>&times;</span> Progress</div>

  <div class="logo-wrap">
    <div class="logo-glow"></div>
    <div class="logo-3d">
      <div class="logo-face front">
        <img src="logo.png" alt="KolKMa logo">
      </div>
      <div class="logo-face back">
        <img src="logo.png" alt="" aria-hidden="true">
      </div>
      <div class="logo-edge" aria-hidden="true"></div>
    </div>
    <div class="logo-shadow" aria-hidden="true"></div>
  </div>

  <h1>We bring people <br> <span class="accent-blue">together</span> to <span class="accent-red">build</span>.</h1>

  <p class="tagline">
    KolKMa connects the people behind every idea — turning collaboration
    into momentum, one project at a time.
  </p>

  <div class="cta-row">
    <a href="#work" class="btn btn-primary">See our work</a>
    <a href="#contact" class="btn btn-ghost">Get in touch</a>
  </div>

  <div class="scroll-hint">Scroll</div>
</section>

</body>
</html>
