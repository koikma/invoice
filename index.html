<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Invoice</title>

<style>
@page {
  size: A4;
  margin: 15mm;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

.invoice-box {
  width: 210mm;
  min-height: 297mm;
  margin: auto;
  background: white;
  padding: 20mm;
  box-sizing: border-box;
}

h1 {
  text-align: right;
  margin-bottom: 30px;
}

.top-section {
  display: flex;
  justify-content: space-between;
  margin-bottom: 30px;
}

input {
  border: none;
  border-bottom: 1px solid #000;
  width: 100%;
  font-size: 14px;
}

.table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

.table th, .table td {
  border: 1px solid #000;
  padding: 8px;
  text-align: left;
}

.table th {
  background: #eee;
}

.total {
  text-align: right;
  margin-top: 20px;
  font-size: 18px;
}

.print-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 10px 20px;
  cursor: pointer;
}

@media print {
  body {
    background: white;
  }

  .print-btn {
    display: none;
  }
}
</style>
</head>

<body>

<button class="print-btn" onclick="window.print()">Print</button>

<div class="invoice-box">

  <h1>INVOICE</h1>

  <div class="top-section">
    <div>
      <strong>From:</strong><br>
      <input value="KoIKMa Berhad"><br>
      <input value="+603 79321481"><br>
      <input value="info@koikma.my">
    </div>

    <div>
      <strong>To:</strong><br>
      <input placeholder="Client Name"><br>
      <input placeholder="Client Phone"><br>
      <input placeholder="Client Email">
    </div>
  </div>

  <div class="top-section">
    <div>
      <strong>Invoice No:</strong><br>
      <input value="INV-001">
    </div>

    <div>
      <strong>Date:</strong><br>
      <input type="date">
    </div>
  </div>

  <table class="table">
    <tr>
      <th>Description</th>
      <th>Qty</th>
      <th>Price (RM)</th>
      <th>Total (RM)</th>
    </tr>

    <tr>
      <td><input></td>
      <td><input type="number"></td>
      <td><input type="number"></td>
      <td><input type="number"></td>
    </tr>

    <tr>
      <td><input></td>
      <td><input type="number"></td>
      <td><input type="number"></td>
      <td><input type="number"></td>
    </tr>

    <tr>
      <td><input></td>
      <td><input type="number"></td>
      <td><input type="number"></td>
      <td><input type="number"></td>
    </tr>

  </table>

  <div class="total">
    <strong>Grand Total: RM <input style="width:150px;"></strong>
  </div>

</div>

</body>
</html>
