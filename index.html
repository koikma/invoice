<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KoIKMa Invoice</title>

<style>
@page {
  size: A4;
  margin: 0;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
}

.invoice {
  width: 210mm;
  height: 297mm;
  padding: 15mm;
  box-sizing: border-box;
  position: relative;
  background: white;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  width: 80px;
}

.company {
  font-size: 14px;
}

.title {
  font-size: 36px;
  font-weight: bold;
  color: #0a2a66;
}

/* INFO */
.info {
  display: flex;
  justify-content: space-between;
  margin-top: 20px;
}

.box {
  width: 48%;
}

.box h3 {
  background: #0a2a66;
  color: white;
  padding: 5px;
  font-size: 14px;
}

input {
  border: none;
  border-bottom: 1px solid #aaa;
  width: 100%;
  margin-bottom: 8px;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

th {
  background: #0a2a66;
  color: white;
  padding: 8px;
  font-size: 13px;
}

td {
  border: 1px solid #ccc;
  padding: 6px;
}

td input {
  width: 100%;
  border: none;
}

/* TOTAL */
.total {
  margin-top: 20px;
  text-align: right;
}

/* WATER IMAGE */
.watermark {
  position: absolute;
  right: 10mm;
  top: 40mm;
  width: 120px;
  opacity: 0.15;
}

/* FOOTER */
.footer {
  position: absolute;
  bottom: 10mm;
  width: 100%;
  text-align: center;
  font-style: italic;
  color: #555;
}

/* PRINT */
@media print {
  input {
    border: none;
  }
}
</style>
</head>

<body>

<div class="invoice">

  <!-- HEADER -->
  <div class="header">
    <div>
      <!-- PUT YOUR LOGO FILE HERE -->
      <img src="kikma.png" class="logo">
      <div class="company">
        <strong>KoIKMa Berhad</strong><br>
        +603 79321481<br>
        info@koikma.my
      </div>
    </div>

    <div class="title">INVOICE</div>
  </div>

  <!-- INFO -->
  <div class="info">
    <div class="box">
      <h3>Bill To</h3>
      <input placeholder="Client Name">
      <input placeholder="Phone">
      <input placeholder="Email">
      <input placeholder="Address">
    </div>

    <div class="box">
      <h3>Invoice Details</h3>
      <input placeholder="Invoice No">
      <input type="date">
      <input placeholder="Payment Terms">
    </div>
  </div>

  <!-- TABLE -->
  <table>
    <tr>
      <th>Description</th>
      <th>Qty</th>
      <th>Price (RM)</th>
      <th>Total</th>
    </tr>

    <tr>
      <td><input></td>
      <td><input type="number"></td>
      <td><input type="number"></td>
      <td><input type="number"></td>
    </tr>

    <tr>
      <td><input></td>
      <td><input type="number"></td>
      <td><input type="number"></td>
      <td><input type="number"></td>
    </tr>

    <tr>
      <td><input></td>
      <td><input type="number"></td>
      <td><input type="number"></td>
      <td><input type="number"></td>
    </tr>

  </table>

  <!-- TOTAL -->
  <div class="total">
    <h3>Grand Total: RM <input style="width:120px;"></h3>
  </div>

  <!-- HYDRATEMAX IMAGE (WATERMARK STYLE) -->
  <img src="22.png" class="watermark">

  <!-- FOOTER -->
  <div class="footer">
    Stay Hydrated. Stay Healthy.
  </div>

</div>

</body>
</html>
