<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KolKMa</title>
<meta name="description" content="KolKMa — bringing people together.">
<link rel="icon" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0B1F4D;
    --red:#E01F26;
    --blue:#1450E0;
    --paper:#FAFAF8;
    --ink-soft:#5A6478;
    --line: rgba(11,31,77,0.10);
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html{ scroll-behavior:smooth; }

  body{
    background:var(--paper);
    color:var(--navy);
    font-family:'Inter', sans-serif;
    overflow-x:hidden;
  }

  /* ---------- NAV ---------- */
  nav{
    position:fixed;
    top:0; left:0; right:0;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:28px 6vw;
    z-index:50;
    transition:background 0.35s ease, box-shadow 0.35s ease;
  }

  nav.on-video{
    background:transparent;
  }

  nav.scrolled{
    background:rgba(250,250,248,0.86);
    backdrop-filter:blur(10px);
    box-shadow:0 1px 0 var(--line);
  }

  .nav-mark{
    display:flex;
    align-items:center;
    gap:10px;
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size:1.1rem;
    letter-spacing:0.02em;
    color:#fff;
    transition:color 0.35s ease;
  }

  nav.scrolled .nav-mark{ color:var(--navy); }

  .nav-mark img{
    width:28px;
    height:28px;
  }

  .nav-links{
    display:flex;
    gap:2.4rem;
    font-size:0.9rem;
  }

  .nav-links a{
    color:rgba(255,255,255,0.82);
    text-decoration:none;
    position:relative;
    transition:color 0.25s ease;
  }

  nav.scrolled .nav-links a{ color:var(--ink-soft); }

  .nav-links a::after{
    content:"";
    position:absolute;
    left:0; bottom:-4px;
    width:0%;
    height:1px;
    background:currentColor;
    transition:width 0.25s ease;
  }

  .nav-links a:hover{ color:#fff; }
  nav.scrolled .nav-links a:hover{ color:var(--navy); }
  .nav-links a:hover::after{ width:100%; }

  /* ---------- VIDEO INTRO (PAGE 1) ---------- */
  .video-intro{
    position:relative;
    width:100%;
    height:100vh;
    height:100svh;
    overflow:hidden;
    background:#050c1f;
  }

  .video-intro video{
    position:absolute;
    top:50%; left:50%;
    min-width:100%;
    min-height:100%;
    width:auto; height:auto;
    transform:translate(-50%,-50%);
    object-fit:cover;
  }

  .video-intro::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(180deg, rgba(5,12,31,0.28) 0%, rgba(5,12,31,0.08) 35%, rgba(5,12,31,0.55) 100%);
    pointer-events:none;
  }

  .video-intro-content{
    position:relative;
    z-index:2;
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-end;
    text-align:center;
    padding:0 6vw 8.5rem;
  }

  .video-eyebrow{
    font-size:0.78rem;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:rgba(255,255,255,0.75);
    margin-bottom:0.25rem;
  }

  .video-eyebrow span{ color:#ff5a5f; }

  .video-word{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:clamp(2.4rem, 7vw, 4.6rem);
    color:#fff;
    letter-spacing:-0.01em;
    text-shadow:0 10px 40px rgba(0,0,0,0.35);
  }

  .scroll-hint{
    position:absolute;
    bottom:2.6rem;
    left:50%;
    transform:translateX(-50%);
    font-size:0.72rem;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:rgba(255,255,255,0.8);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:0.5rem;
    z-index:2;
  }

  .scroll-hint::after{
    content:"";
    width:1px;
    height:34px;
    background:linear-gradient(rgba(255,255,255,0.8), transparent);
    animation:pulse 2s ease-in-out infinite;
  }

  @keyframes pulse{
    0%,100%{ opacity:0.3; }
    50%{ opacity:1; }
  }

  /* ---------- HERO (PAGE 2) ---------- */
  .hero{
    position:relative;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:7rem 6vw 5rem;
  }

  .orbit-field{
    position:absolute;
    top:50%; left:50%;
    width:min(720px, 92vw);
    height:min(720px, 92vw);
    transform:translate(-50%,-52%);
    pointer-events:none;
  }

  .orbit-ring{
    position:absolute;
    inset:0;
    border-radius:50%;
    border:1px solid var(--line);
  }
  .orbit-ring.r2{ inset:9%; }
  .orbit-ring.r3{ inset:18%; }

  .eyebrow{
    font-size:0.78rem;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:1.1rem;
  }

  .eyebrow span{ color:var(--red); }

  .logo-wrap{
    position:relative;
    width:min(220px, 34vw);
    height:min(220px, 34vw);
    margin-bottom:2.6rem;
    perspective:600px;
  }

  .logo-3d{
    position:relative;
    width:100%;
    height:100%;
  }

  .logo-face{
    position:absolute;
    inset:0;
  }

  .logo-face img{
    width:100%;
    height:100%;
    filter:drop-shadow(0 18px 34px rgba(11,31,77,0.16));
  }

  .logo-face.back{
    display:none;
  }

  .logo-edge{
    display:none;
  }

  .logo-shadow{
    position:absolute;
    left:42%;
    bottom:-14px;
    width:60%;
    height:16px;
    transform:translateX(-50%);
    background:radial-gradient(ellipse, rgba(11,31,77,0.20) 0%, rgba(11,31,77,0) 72%);
    z-index:-1;
  }

  .logo-glow{
    position:absolute;
    inset:-14%;
    border-radius:50%;
    background:radial-gradient(circle, rgba(224,31,38,0.10) 0%, rgba(20,80,224,0.08) 45%, rgba(255,255,255,0) 72%);
    z-index:-1;
  }

  h1{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:clamp(2.6rem, 7vw, 5.4rem);
    line-height:1.02;
    letter-spacing:-0.01em;
  }

  h1 .accent-blue{ color:var(--blue); }
  h1 .accent-red{ color:var(--red); }

  .tagline{
    max-width:520px;
    margin:1.6rem auto 0;
    font-size:1.05rem;
    line-height:1.6;
    color:var(--ink-soft);
  }

  .cta-row{
    display:flex;
    gap:1rem;
    margin-top:2.6rem;
  }

  .btn{
    font-family:'Inter', sans-serif;
    font-size:0.92rem;
    font-weight:500;
    padding:0.9rem 1.8rem;
    border-radius:999px;
    text-decoration:none;
    transition:transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    display:inline-block;
  }

  .btn-primary{
    background:var(--navy);
    color:#fff;
  }
  .btn-primary:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 24px rgba(11,31,77,0.25);
  }

  .btn-ghost{
    color:var(--navy);
    border:1px solid var(--line);
  }
  .btn-ghost:hover{
    border-color:var(--navy);
    transform:translateY(-2px);
  }

  @media (prefers-reduced-motion: reduce){
    .logo-3d{ animation:none; }
    .logo-face img{ animation:none; }
    .logo-edge{ animation:none; opacity:0; }
    .logo-shadow{ animation:none; }
    .scroll-hint::after{ animation:none; }
  }

  @media (max-width:640px){
    .nav-links{ display:none; }
  }
</style>
</head>
<body>

<nav class="on-video" id="siteNav">
  <div class="nav-mark">
    <img src="logo.png" alt="KolKMa logo">
    KolKMa
  </div>
  <div class="nav-links">
    <a href="#about">About</a>
    <a href="#work">Work</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<!-- PAGE 1 — full-bleed video, nothing else -->
<section class="video-intro" id="top">
  <video
    src="logo koikma pusing.mp4"
    autoplay
    muted
    loop
    playsinline
    preload="auto">
  </video>

  <div class="video-intro-content">
    <div class="video-eyebrow">People <span>&times;</span> Purpose <span>&times;</span> Progress</div>
    <div class="video-word">KolKMa</div>
  </div>

  <div class="scroll-hint">Scroll</div>
</section>

<!-- PAGE 2 — the site starts here -->
<section class="hero" id="about">
  <div class="orbit-field" aria-hidden="true">
    <div class="orbit-ring"></div>
    <div class="orbit-ring r2"></div>
    <div class="orbit-ring r3"></div>
  </div>

  <div class="eyebrow">People <span>&times;</span> Purpose <span>&times;</span> Progress</div>

  <div class="logo-wrap">
    <div class="logo-glow"></div>
    <div class="logo-3d">
      <div class="logo-face front">
        <img src="logo.png" alt="KolKMa logo">
      </div>
      <div class="logo-face back">
        <img src="logo.png" alt="" aria-hidden="true">
      </div>
      <div class="logo-edge" aria-hidden="true"></div>
    </div>
    <div class="logo-shadow" aria-hidden="true"></div>
  </div>

  <h1>We bring people <br> <span class="accent-blue">together</span> to <span class="accent-red">build</span>.</h1>

  <p class="tagline">
    KolKMa connects the people behind every idea — turning collaboration
    into momentum, one project at a time.
  </p>

  <div class="cta-row">
    <a href="#work" class="btn btn-primary">See our work</a>
    <a href="#contact" class="btn btn-ghost">Get in touch</a>
  </div>
</section>

<script>
  const nav = document.getElementById('siteNav');
  const videoIntro = document.getElementById('top');

  function updateNav(){
    const introHeight = videoIntro.offsetHeight;
    if (window.scrollY > introHeight - 80){
      nav.classList.remove('on-video');
      nav.classList.add('scrolled');
    } else {
      nav.classList.add('on-video');
      nav.classList.remove('scrolled');
    }
  }

  window.addEventListener('scroll', updateNav, { passive:true });
  updateNav();
</script>

</body>
</html>
